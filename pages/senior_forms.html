<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trevor Day School Yearbook</title>
  <link rel="stylesheet" href="../resources/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <!-- Navigation Menu-->
  <div id="navbar"></div>

  <!-- Main Content -->
  <div class="main-content">
    <h1>Senior Forms</h1>

    <!-- Countdowns -->
     <div id="countdown-title">Loading...</div>
  <div id="countdown">Loading...</div>

  <!-- Forms -->
  </div>
  <section class="faqs">
    <div class="faq-container" id="forms-container"></div>
  </section>

  <script>
    fetch('../resources/forms.json')
      .then(res => res.json())
      .then(forms => {
        const container = document.getElementById('forms-container');
        forms.forEach(form => {
          const item = document.createElement('div');
          item.className = 'faq-item';
          item.innerHTML = `
            <button class="faq-question">
              ${form.name}
              <span class="faq-icon">+</span>
            </button>
            <div class="faq-answer">
              <div class="form">
                <iframe src="${form.src}" width="840" height="${form.height}"
                  frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
              </div>
            </div>`;
          container.appendChild(item);

          item.querySelector('.faq-question').addEventListener('click', function () {
            const answer = this.nextElementSibling;
            if (answer.style.maxHeight) {
              answer.style.maxHeight = null;
              this.querySelector('.faq-icon').textContent = '+';
            } else {
              answer.style.maxHeight = answer.scrollHeight + "px";
              this.querySelector('.faq-icon').textContent = '−';
            }
          });
        });
      });
  </script>
  <script>
    // Use the raw GitHub Pages URL for JSON if hosted on GitHub
    const jsonURL = 'countdown.json'; // or 'https://username.github.io/repo-name/countdown.json'

    fetch(jsonURL)
      .then(response => response.json())
      .then(data => {
        const countdownTitle = document.getElementById('countdown-title');
        const countdownElement = document.getElementById('countdown');

        countdownTitle.textContent = data.title;

        const targetDate = new Date(data.date).getTime();

        const interval = setInterval(() => {
          const now = new Date().getTime();
          const distance = targetDate - now;

          if (distance <= 0) {
            clearInterval(interval);
            countdownElement.textContent = "Time's up!";
            return;
          }

          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((distance % (1000 * 60)) / 1000);

          countdownElement.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }, 1000);
      })
      .catch(err => {
        document.getElementById('countdown-title').textContent = "Error loading countdown";
        console.error(err);
      });
  </script>
  <script type="module" src="../resources/navbar.js"></script>
</body>

</html>
