<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trevor Day School Yearbook</title>
  <link rel="stylesheet" href="../resources/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <!-- Navigation Menu-->
  <div id="navbar"></div>

  <!-- Main Content -->
  <div class="main-content">
    <h1>Yearbook FAQs</h1>
  </div>
  <section class="faqs">
    <div class="faq-container">
      <div class="faq-item">
        <button class="faq-question">
          How do I submit photos for the yearbook?
          <span class="faq-icon">+</span>
        </button>
        <div class="faq-answer">
          <p>You can submit photos through our online submission portal. Please ensure that your photos are high
            resolution and adhere to our submission guidelines.</p>
        </div>
      </div>
    </div>
  </section>
  <script>
    const faqButtons = document.querySelectorAll('.faq-question');

    faqButtons.forEach(button => {
      button.addEventListener('click', () => {
        const answer = button.nextElementSibling;

        if (answer.style.maxHeight) {
          // collapse
          answer.style.maxHeight = null;
          button.querySelector('.faq-icon').textContent = '+';
        } else {
          // expand
          answer.style.maxHeight = answer.scrollHeight + "px";
          button.querySelector('.faq-icon').textContent = '−';
        }
      });
    });</script>
  <script type="module" src="../resources/navbar.js"></script>
</body>

</html>
